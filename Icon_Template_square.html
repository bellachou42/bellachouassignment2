<!DOCTYPE html>
<html>
    <head>
         <title>Bella's website</title>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/buzz/1.2.1/buzz.min.js"></script>
        <style>
            .row{
                width:1050px;
                margin: 30px auto 50px auto ;
            }
            .image-container {
                display: table-cell;
                vertical-align: middle;
                padding:4px;
            }
            .image-container img:hover {
                transform: scale(var(--scale));
                transition: transform 0.3s ease;
                --scale:1.1;
            }
        </style>
    </head>

    <body style="background-color: rgb(37, 32, 47);">

        <div class="row">
            <div class="image-container"><img id="1" src="img/2.png" height="240"onmouseover="this.src='img/11.png';" onmouseout="this.src='img/2.png';" style="--scale:1.15;"/></div>
            <div class="image-container"><img id="2" src="img/1.png" height="240" onmouseover="this.src='img/10.png';" onmouseout="this.src='img/1.png';" style="--scale:1.15;"/></div>
            <div class="image-container"><img id="3" src="img/6.png" height="250" onmouseover="this.src='img/12.png';" onmouseout="this.src='img/6.png';" style="--scale:1.1;"/></div>
        </div>

        <div class="row">
            <div class="image-container"><img id="4" src="img/4.png" height="240" onmouseover="this.src='img/13.png';" onmouseout="this.src='img/4.png';" style="--scale:1.2;" height="230" width="340"/></div>
            <div class="image-container"><img id="5" src="img/5.png" height="240" onmouseover="this.src='img/14.png';" onmouseout="this.src='img/5.png';"style="--scale:1.2;"/></div>
            <div class="image-container"><img id="6" src="img/3.png" height="245" onmouseover="this.src='img/20-15.png';" onmouseout="this.src='img/3.png';" style="--scale:1.2;"/></div>
        </div>

        <div class="row">
            <div class="image-container"><img id="7" src="img/7.png" height="240" onmouseover="this.src='img/20-16.png';" onmouseout="this.src='img/7.png';" style="--scale:1.3;"/></div>
            <div class="image-container"><img id="8" src="img/8.png" height="240" onmouseover="this.src='img/20-17.png';" onmouseout="this.src='img/8.png';"style="--scale:1.2;"/></div>
            <div class="image-container"><img id="9" src="img/9.png" height="240" onmouseover="this.src='img/18.png';" onmouseout="this.src='img/9.png';"style="--scale:1.25;"/></div>
        </div>



        <script>
            var sound1 = new buzz.sound("sound/nightmere.mp3");
            var sound2 = new buzz.sound("sound/cloudandstars.mp3");
            var sound3 = new buzz.sound("sound/magic.mp3");
            var sound4 = new buzz.sound("sound/clocktick.mp3");
            var sound5 = new buzz.sound("sound/moonblink.mp3");
            var sound6 = new buzz.sound("sound/alarm.mp3");
            var sound7 = new buzz.sound("sound/swap.mp3");
            var sound8 = new buzz.sound("sound/unlock.mp3");
            var sound9 = new buzz.sound("sound/door.mp3");

            window.onload = function() {
                document.getElementById('1').addEventListener('click', function () {sound1.play();});
                document.getElementById('2').addEventListener('click', function () {sound2.play();});
                document.getElementById('3').addEventListener('click', function () {sound4.play();});
                document.getElementById('4').addEventListener('click', function () {sound8.play();});
                document.getElementById('5').addEventListener('click', function () {sound9.play();});
                document.getElementById('6').addEventListener('click', function () {sound7.play();});
                document.getElementById('7').addEventListener('click', function () {sound5.play();});
                document.getElementById('8').addEventListener('click', function () {sound6.play();});
                document.getElementById('9').addEventListener('click', function () {sound3.play();});
            };

        </script>
        
    </body>
    
</html>
